apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-broker-config
data:
  config.toml: |
    [telegram]
    bot_token = "${TELEGRAM_BOT_TOKEN}"
    allowed_users = [123456789]          # replace with your Telegram user ID

    [agent]
    command = "kiro-cli"
    args = ["acp", "--trust-all-tools"]
    working_dir = "/home/agent"

    [pool]
    max_sessions = 10
