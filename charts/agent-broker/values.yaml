image:
  pullPolicy: IfNotPresent

replicas: 1

strategy:
  type: Recreate

resources: {}

persistence:
  enabled: true
  storageClass: ""
  size: 1Gi

discord:
  botToken: ""            # set via --set or external secret
  allowedChannels:
    - "YOUR_CHANNEL_ID"

# Select which agent to use. Must match a key in the `agents` map below.
activeAgent: kiro

# Agent definitions. Each entry configures a different CLI agent.
# You can override any field or add your own custom agent.
agents:
  kiro:
    image:
      repository: ghcr.io/thepagent/agent-broker
      tag: ""             # defaults to .Chart.AppVersion
    command: kiro-cli
    args:
      - acp
      - --trust-all-tools

  codex:
    image:
      repository: ghcr.io/thepagent/agent-broker-codex
      tag: ""
    command: codex-acp
    args: []

  claude:
    image:
      repository: ghcr.io/thepagent/agent-broker-claude
      tag: ""
    command: claude-agent-acp
    args: []

  gemini:
    image:
      repository: ghcr.io/thepagent/agent-broker-gemini
      tag: ""
    command: gemini
    args:
      - --acp

# Shared agent settings (apply to all agents)
agent:
  workingDir: /home/agent
  env: {}
    # ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"

pool:
  maxSessions: 10
  sessionTtlHours: 24

reactions:
  enabled: true
  removeAfterReply: false

agentsMd: ""
  # agentsMd: |
  #   IDENTITY - your agent identity
  #   SOUL - your agent personality
  #   USER - how agent should address the user

env: {}
envFrom: []

nodeSelector: {}
tolerations: []
affinity: {}
