name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.7.0-beta.1 or v0.7.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (build only, no push or chart bump)'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      chart_version: ${{ steps.resolve.outputs.chart_version }}
      image_sha: ${{ steps.resolve.outputs.image_sha }}
      is_beta: ${{ steps.resolve.outputs.is_beta }}
    steps:
      - name: Resolve and validate tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          # Validate tag format
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Invalid tag format '${TAG}'. Expected v{major}.{minor}.{patch}[-prerelease]"
            exit 1
          fi

          CHART_VERSION="${TAG#v}"
          IMAGE_SHA="${{ github.sha }}"
          IMAGE_SHA="${IMAGE_SHA:0:7}"

          # Beta if version contains '-' (e.g. 0.7.0-beta.1)
          if [[ "$CHART_VERSION" == *-* ]]; then
            IS_BETA="true"
          else
            IS_BETA="false"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_sha=${IMAGE_SHA}" >> "$GITHUB_OUTPUT"
          echo "is_beta=${IS_BETA}" >> "$GITHUB_OUTPUT"

  build-image:
    needs: resolve-tag
    if: ${{ needs.resolve-tag.outputs.is_beta == 'true' }}
    strategy:
      matrix:
        variant:
          - { suffix: "", dockerfile: "Dockerfile", artifact: "default" }
          - { suffix: "-codex", dockerfile: "Dockerfile.codex", artifact: "codex" }
          - { suffix: "-claude", dockerfile: "Dockerfile.claude", artifact: "claude" }
          - { suffix: "-gemini", dockerfile: "Dockerfile.gemini", artifact: "gemini" }
        platform:
          - { os: linux/amd64, runner: ubuntu-latest }
          - { os: linux/arm64, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.variant.suffix }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.variant.dockerfile }}
          platforms: ${{ matrix.platform.os }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.variant.suffix }},push-by-digest=true,name-canonical=true,push=${{ inputs.dry_run != true }}
          cache-from: type=gha,scope=${{ matrix.variant.suffix }}-${{ matrix.platform.os }}
          cache-to: type=gha,scope=${{ matrix.variant.suffix }}-${{ matrix.platform.os }},mode=max

      - name: Export digest
        if: inputs.dry_run != true
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: inputs.dry_run != true
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.variant.artifact }}-${{ matrix.platform.runner }}
          path: /tmp/digests/*
          retention-days: 1

  merge-manifests:
    needs: [resolve-tag, build-image]
    if: ${{ inputs.dry_run != true && needs.resolve-tag.outputs.is_beta == 'true' }}
    strategy:
      matrix:
        variant:
          - { suffix: "", artifact: "default" }
          - { suffix: "-codex", artifact: "codex" }
          - { suffix: "-claude", artifact: "claude" }
          - { suffix: "-gemini", artifact: "gemini" }
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.variant.artifact }}-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.variant.suffix }}
          tags: |
            type=sha,prefix=
            type=semver,pattern={{version}},value=${{ needs.resolve-tag.outputs.tag }}

      - name: Create manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.variant.suffix }}@sha256:%s ' *)

  promote-stable:
    needs: resolve-tag
    if: ${{ inputs.dry_run != true && needs.resolve-tag.outputs.is_beta == 'false' }}
    strategy:
      matrix:
        variant:
          - { suffix: "" }
          - { suffix: "-codex" }
          - { suffix: "-claude" }
          - { suffix: "-gemini" }
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify beta image exists
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.variant.suffix }}"
          IMAGE_SHA="${{ needs.resolve-tag.outputs.image_sha }}"
          echo "Checking ${IMAGE}:${IMAGE_SHA} ..."
          docker buildx imagetools inspect "${IMAGE}:${IMAGE_SHA}" || \
            { echo "::error::Image ${IMAGE}:${IMAGE_SHA} not found — build a beta on this commit first"; exit 1; }

      - name: Promote to stable tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.variant.suffix }}"
          IMAGE_SHA="${{ needs.resolve-tag.outputs.image_sha }}"
          CHART_VERSION="${{ needs.resolve-tag.outputs.chart_version }}"
          MAJOR_MINOR="${CHART_VERSION%.*}"

          echo "Promoting ${IMAGE}:${IMAGE_SHA} → ${CHART_VERSION}, ${MAJOR_MINOR}, latest"
          docker buildx imagetools create \
            -t "${IMAGE}:${CHART_VERSION}" \
            -t "${IMAGE}:${MAJOR_MINOR}" \
            -t "${IMAGE}:latest" \
            "${IMAGE}:${IMAGE_SHA}"

  release-chart-beta:
    needs: [resolve-tag, merge-manifests]
    if: ${{ inputs.dry_run != true && needs.resolve-tag.outputs.is_beta == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push beta chart to OCI
        run: |
          CHART_VERSION="${{ needs.resolve-tag.outputs.chart_version }}"
          IMAGE_SHA="${{ needs.resolve-tag.outputs.image_sha }}"

          sed -i "s/^version: .*/version: ${CHART_VERSION}/" charts/openab/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${IMAGE_SHA}\"/" charts/openab/Chart.yaml
          sed -i "s|repository: .*|repository: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}|" charts/openab/values.yaml
          sed -i "s/tag: .*/tag: \"${IMAGE_SHA}\"/" charts/openab/values.yaml

          helm package charts/openab
          helm push openab-${CHART_VERSION}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

  bump-chart-stable:
    needs: [resolve-tag, promote-stable]
    if: ${{ inputs.dry_run != true && needs.resolve-tag.outputs.is_beta == 'false' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Chart.yaml and values.yaml
        run: |
          CHART_VERSION="${{ needs.resolve-tag.outputs.chart_version }}"
          IMAGE_SHA="${{ needs.resolve-tag.outputs.image_sha }}"
          sed -i "s/^version: .*/version: ${CHART_VERSION}/" charts/openab/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${IMAGE_SHA}\"/" charts/openab/Chart.yaml
          sed -i "s|repository: .*|repository: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}|" charts/openab/values.yaml
          sed -i "s/tag: .*/tag: \"${IMAGE_SHA}\"/" charts/openab/values.yaml

      - name: Create and auto-merge bump PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          CHART_VERSION="${{ needs.resolve-tag.outputs.chart_version }}"
          IMAGE_SHA="${{ needs.resolve-tag.outputs.image_sha }}"
          BRANCH="chore/chart-${CHART_VERSION}"
          git config user.name "openab-app[bot]"
          git config user.email "274185012+openab-app[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add charts/openab/Chart.yaml charts/openab/values.yaml
          git commit -m "chore: bump chart to ${CHART_VERSION}

          image: ${IMAGE_SHA}"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "chore: bump chart to ${CHART_VERSION}" \
            --body "Auto-generated chart version bump for image \`${IMAGE_SHA}\`." \
            --base main --head "$BRANCH")
          gh pr merge "$PR_URL" --squash --delete-branch
